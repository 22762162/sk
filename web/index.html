<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>三鉴 · 四柱排盘(V1.0 私人研究测试页)</title>
<style>
  :root { --ink:#2b2620; --paper:#faf6ef; --accent:#8c4a2f; --line:#d8cfc0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Songti SC","Noto Serif CJK SC",serif; background:var(--paper); color:var(--ink); }
  main { max-width:720px; margin:0 auto; padding:48px 20px 64px; }
  h1 { font-size:28px; letter-spacing:.12em; margin:0 0 6px; }
  .sub { color:#7a6f5f; font-size:13px; margin-bottom:32px; }
  form { display:flex; flex-wrap:wrap; gap:12px; align-items:end; padding:20px;
         border:1px solid var(--line); border-radius:10px; background:#fffdf8; }
  label { display:flex; flex-direction:column; gap:6px; font-size:13px; color:#5d5346; }
  input, select { font:inherit; padding:8px 10px; border:1px solid var(--line); border-radius:6px; background:#fff; }
  button { font:inherit; padding:10px 26px; border:none; border-radius:6px; background:var(--accent);
           color:#fff; letter-spacing:.2em; cursor:pointer; }
  button:hover { filter:brightness(1.08); }
  #result { margin-top:36px; display:none; }
  .pillars { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .pillar { border:1px solid var(--line); border-radius:10px; background:#fff; text-align:center; padding:18px 6px; }
  .pillar .t { font-size:12px; color:#8a7f6e; letter-spacing:.3em; }
  .pillar .g { font-size:34px; margin-top:8px; letter-spacing:.1em; }
  .metaline { margin-top:14px; font-size:12px; color:#7a6f5f; line-height:1.8; }
  .err { margin-top:20px; color:#a33; display:none; }
  footer { margin-top:48px; font-size:12px; color:#8a7f6e; border-top:1px solid var(--line); padding-top:16px; line-height:1.9; }
  @media (max-width:560px){ .pillars{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<main>
  <h1>三鉴 · 四柱排盘</h1>
  <div class="sub">V1.0 私人研究测试页 —— 只做历法换算,不含任何解读</div>

  <form id="f">
    <label>出生日期(公历)
      <input type="date" id="d" required min="1901-01-01" max="2099-12-31" value="1990-06-15">
    </label>
    <label>出生时间(北京时间)
      <input type="time" id="t" required step="60" value="08:30">
    </label>
    <label>子时归属(流派配置)
      <select id="mode">
        <option value="split" selected>早晚子时(晚子时不换日柱)</option>
        <option value="unified">子时换日(23 点起算次日)</option>
      </select>
    </label>
    <label>性别(排大运用;男阳女阴顺逆不同)
      <select id="gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </label>
    <button type="submit">排 盘</button>
  </form>

  <div id="err" class="err"></div>

  <section id="result">
    <div class="pillars">
      <div class="pillar"><div class="t">年 柱</div><div class="g" id="py">—</div></div>
      <div class="pillar"><div class="t">月 柱</div><div class="g" id="pm">—</div></div>
      <div class="pillar"><div class="t">日 柱</div><div class="g" id="pd">—</div></div>
      <div class="pillar"><div class="t">时 柱</div><div class="g" id="ph">—</div></div>
    </div>
    <div class="metaline" id="meta"></div>
    <div id="amb" style="display:none; margin-top:18px; padding:14px 16px; border:1px solid #d8b56a;
         border-radius:8px; background:#fdf6e3; font-size:13px; line-height:1.9;"></div>
    <div style="margin-top:22px; display:flex; gap:12px; flex-wrap:wrap;">
      <button type="button" id="qr" style="background:#4a5f8c;">AI 速览(单模型)</button>
      <button type="button" id="cs" style="background:#6b3f6b;">三模型会诊(观察模式)</button>
    </div>
    <div id="qrout" style="display:none; margin-top:14px;"></div>
    <div id="csout" style="display:none; margin-top:18px;"></div>
    <div style="margin-top:26px; border-top:1px solid var(--line); padding-top:20px;">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button type="button" id="pv" style="background:#2c6a66;">我的预测 · 命中率</button>
        <span style="font-size:12px;color:#8a7f6e;">记录预测 → 到期回访 → 看命中率。数据越多越准。</span>
      </div>
      <div id="pvout" style="display:none; margin-top:14px;"></div>
    </div>
  </section>

  <footer>
    本页面为私人研究工具,不对外提供服务。展示内容仅为「出生时刻 → 干支历法」的确定性换算结果
    (claim 类型:computed_fact),不构成任何命理论断或生活建议;历法数据或有误差,结论倾向于
    仅供研究比对。数据来源:节气时刻由 JPL DE440s 星历自算并经香港天文台公开资料核对;
    日柱锚点经韩国天文研究院与台湾中研院双源核实;时区换算依 IANA tzdata(含历史夏令时)。
  </footer>
</main>
<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'), res = document.getElementById('result');
  err.style.display = 'none'; res.style.display = 'none';
  const birth = document.getElementById('d').value + 'T' + document.getElementById('t').value;
  try {
    const r = await fetch('/api/paipan', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({birth, zi_hour_mode: document.getElementById('mode').value})
    });
    const j = await r.json();
    if (!j.ok) { err.textContent = '无法排盘:' + (j.error || '未知错误'); err.style.display = 'block'; return; }
    const o = j.output;
    document.getElementById('py').textContent = o.year.ganzhi;
    document.getElementById('pm').textContent = o.month.ganzhi;
    document.getElementById('pd').textContent = o.day.ganzhi;
    document.getElementById('ph').textContent = o.hour.ganzhi;
    document.getElementById('meta').textContent =
      `八字年:${o.bazi_year} · 节气月:${j.meta.jie_window.name}起 · 子时口径:` +
      (j.meta.zi_hour_mode === 'split' ? '早晚子时' : '子时换日') +
      (j.meta.dst_applied ? ' · 该时刻处于历史夏令时,已按 tzdata 换算' : '');
    const amb = document.getElementById('amb');
    if (j.result_status === 'ambiguous') {
      const srcName = {lichun_boundary: '立春交节', jie_boundary: '节气交接',
                       hour_boundary: '时辰交界', day_boundary: '日界'};
      const srcs = (j.uncertainty_sources || []).map(s => srcName[s] || s).join('、');
      const fmt = c => [c.year, c.month, c.day, c.hour].map(p => p.ganzhi).join(' ');
      let html = `此出生时间距 <b>${srcs}</b> 不足一分钟,按分钟精度存在两种可能的命盘,倾向于都列出供比对:`;
      (j.candidate_charts || []).forEach((c, i) => {
        html += `<br>候选 ${i + 1}:<b>${fmt(c)}</b>(八字年 ${c.bazi_year})`;
      });
      amb.innerHTML = html;
      amb.style.display = 'block';
    } else {
      amb.style.display = 'none';
    }
    res.style.display = 'block';
  } catch (_) {
    err.textContent = '请求失败:请确认本地服务已启动(make v1-serve)';
    err.style.display = 'block';
  }
});

document.getElementById('qr').addEventListener('click', async () => {
  const box = document.getElementById('qrout'), btn = document.getElementById('qr');
  box.style.display = 'block';
  box.innerHTML = '<span style="color:#7a6f5f;">调用模型中(每次调用计入日熔断上限)…</span>';
  btn.disabled = true;
  const birth = document.getElementById('d').value + 'T' + document.getElementById('t').value;
  try {
    const r = await fetch('/api/quickread', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({birth, zi_hour_mode: document.getElementById('mode').value})
    });
    const j = await r.json();
    if (!j.ok) { box.innerHTML = '<span style="color:#a33;">速览失败:' + (j.error || '未知错误') + '</span>'; return; }
    const tag = t => t === 'computed_fact'
      ? '<span style="background:#3d6b46;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;">计算事实 · 引擎签名</span>'
      : '<span style="background:#8c6a2f;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;">模型综合 · 无规则依据</span>';
    box.innerHTML = j.claims.map(c =>
      `<div style="border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px 14px;margin-bottom:10px;">
         ${tag(c.claim_type)} <span style="font-size:11px;color:#8a7f6e;">置信:${c.confidence.confidence_label}</span>
         <div style="margin-top:8px;line-height:1.9;">${c.claim}</div>
         ${c.limitations.length ? `<div style="margin-top:6px;font-size:11px;color:#8a7f6e;">限制:${c.limitations.join(';')}</div>` : ''}
       </div>`).join('') +
      `<div style="font-size:11px;color:#8a7f6e;">run ${j.run_id} · ${j.model} · 本条速览仅为研究观察,倾向性表述不构成任何论断依据</div>`;
  } catch (_) {
    box.innerHTML = '<span style="color:#a33;">请求失败</span>';
  } finally { btn.disabled = false; }
});

const SCHOOL_COLORS = {ziping:'#8c4a2f', wangshuai:'#2f6b8c', tiaohou:'#2f8c5a'};
const VERDICT = {
  consensus: {t:'共识', c:'#3d6b46'},
  dissent:   {t:'流派分歧(保留)', c:'#8c6a2f'},
  unresolved:{t:'证据不足·未决', c:'#7a6f5f'}
};
document.getElementById('cs').addEventListener('click', async () => {
  const box = document.getElementById('csout'), btn = document.getElementById('cs');
  box.style.display = 'block';
  box.innerHTML = '<span style="color:#7a6f5f;">三模型会诊启动中…</span>';
  btn.disabled = true;
  const birth = document.getElementById('d').value + 'T' + document.getElementById('t').value;
  try {
    const sr = await fetch('/api/consult/start', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({birth, zi_hour_mode: document.getElementById('mode').value, gender: document.getElementById('gender').value, arm: 'D3J'})
    });
    const sj = await sr.json();
    if (!sj.ok || !sj.job_id) { box.innerHTML = '<span style="color:#a33;">会诊启动失败,请确认服务运行</span>'; return; }
    const t0 = Date.now();
    let j = null;
    while (true) {
      await new Promise(res => setTimeout(res, 3000));
      const el = Math.round((Date.now() - t0) / 1000);
      if (el > 450) { box.innerHTML = '<span style="color:#a33;">会诊超时(&gt;7.5 分钟),可能某个模型偏慢,请重试</span>'; return; }
      box.innerHTML = `<span style="color:#7a6f5f;">三模型会诊进行中(三辩手 → 匿名质证 → 轮换裁判 → 大运流年推演)…已 ${el} 秒,内容较全通常 3–5 分钟,请耐心等待、勿关闭本页</span>`;
      let rj;
      try { rj = await (await fetch('/api/consult/result?job_id=' + encodeURIComponent(sj.job_id))).json(); }
      catch (e) { continue; }
      if (rj.status === 'running') continue;
      if (rj.status === 'done' || rj.status === 'error') { j = rj.result; break; }
      box.innerHTML = '<span style="color:#a33;">会诊任务丢失,请重试</span>'; return;
    }
    if (!j.ok) { box.innerHTML = '<span style="color:#a33;">会诊失败:' + (j.error || '未知') + '</span>'; return; }
    const cs = j.consultation;
    window.LASTC = {line: (j.chart && j.chart.line) || '', hash: cs.consultation_id || ''};
    let html = `<div style="font-size:13px;color:#7a6f5f;margin-bottom:12px;">会诊 ${cs.consultation_id} · 实验臂 ${cs.arm} · 三家异构模型互证</div>`;

    // —— 白话解读(主呈现;说人话)——
    const ps = cs.plain_summary;
    const TEND = {favorable:{t:'偏顺',c:'#3f7d55',bg:'#eef6f0'}, caution:{t:'留意',c:'#b5762a',bg:'#fbf3e6'}, neutral:{t:'中性',c:'#6b6459',bg:'#f2efe9'}};
    if (ps) {
      html += `<div style="border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px 18px;margin-bottom:14px;">
        <div style="font-size:12px;color:#8a7f6e;letter-spacing:2px;margin-bottom:8px;">白话解读 · 说人话</div>`;
      if (ps.overview) html += `<div style="font-size:15px;line-height:1.9;margin-bottom:12px;">${ps.overview}</div>`;
      const ssArr = (j.chart && j.chart.shensha) || [];
      if (ssArr.length) {
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">' +
          ssArr.map(s => `<span title="${s.note}" style="font-size:11px;background:#f2efe9;border:1px solid var(--line);border-radius:12px;padding:2px 9px;">${s.name} <span style="color:#8a7f6e;">${s.branch}</span></span>`).join('') + '</div>';
      }
      html += '<div style="display:grid;grid-template-columns:1fr;gap:8px;">';
      (ps.domains||[]).forEach(dm => {
        const te = TEND[dm.tendency] || TEND.neutral;
        html += `<div style="border:1px solid var(--line);border-left:4px solid ${te.c};border-radius:8px;background:${te.bg};padding:10px 14px;">
          <div style="font-size:13px;"><b>${dm.domain}</b>
            <span style="background:${te.c};color:#fff;font-size:10px;padding:1px 8px;border-radius:9px;margin-left:6px;">${te.t}</span>
            ${dm.confidence?`<span style="color:#8a7f6e;font-size:11px;margin-left:5px;">把握 ${dm.confidence==='medium'?'中等':'较低'}</span>`:''}</div>
          <div style="font-size:14px;line-height:1.8;margin-top:5px;">${dm.reading||''}</div>
          <button class="recbtn" data-domain="${dm.domain}" data-reading="${encodeURIComponent(dm.reading||'')}" style="margin-top:8px;font-size:11px;background:#2c6a66;color:#fff;border:0;border-radius:6px;padding:4px 10px;cursor:pointer;">＋ 记录为预测</button></div>`;
      });
      html += '</div>';
      const du = j.chart && j.chart.dayun;
      if (ps.dayun || (du && du.periods)) {
        html += '<div style="margin-top:16px;font-size:12px;color:#8a7f6e;letter-spacing:2px;">大运 · 十年大背景</div>';
        if (ps.dayun) html += `<div style="font-size:14px;line-height:1.8;margin-top:5px;">${ps.dayun}</div>`;
        if (du && du.periods) {
          const nowY = new Date().getFullYear();
          html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">' +
            du.periods.map(p => {
              const cur = p.start_year <= nowY && nowY < p.end_year;
              return `<span style="font-size:11px;border:1px solid ${cur?'#2c6a66':'var(--line)'};background:${cur?'#eef6f0':'#fff'};color:${cur?'#2c6a66':'#5d5346'};border-radius:8px;padding:3px 9px;">${p.ganzhi} <span style="color:#8a7f6e;">${p.start_year}–${p.end_year}</span>${cur?' ·现在':''}</span>`;
            }).join('') + '</div>';
          html += `<div style="font-size:11px;color:#8a7f6e;margin-top:4px;">${du.direction} · ${du.start_age}岁起运(起运岁为近似)</div>`;
        }
      }
      if (ps.yearly && ps.yearly.length) {
        html += '<div style="margin-top:16px;font-size:12px;color:#8a7f6e;letter-spacing:2px;">流年 · 逐年推演</div>';
        html += '<div style="display:grid;grid-template-columns:1fr;gap:6px;margin-top:6px;">';
        ps.yearly.forEach(y => {
          const te = TEND[y.tendency] || TEND.neutral;
          html += `<div style="border-left:3px solid ${te.c};background:${te.bg};border-radius:6px;padding:8px 12px;">
            <div style="font-size:13px;"><b>${y.year}</b> <span style="color:#8a7f6e;">${y.ganzhi||''}</span>
              <span style="background:${te.c};color:#fff;font-size:10px;padding:1px 7px;border-radius:9px;margin-left:5px;">${te.t}</span>
              ${(y.key_domains&&y.key_domains.length)?`<span style="color:#8a7f6e;font-size:11px;margin-left:4px;">${y.key_domains.join('·')}</span>`:''}</div>
            <div style="font-size:13px;line-height:1.7;margin-top:3px;">${y.reading||''}</div>
            <button class="recbtn" data-domain="流年${y.year}" data-reading="${encodeURIComponent(y.year + ' ' + (y.ganzhi||'') + ':' + (y.reading||''))}" style="margin-top:6px;font-size:11px;background:#2c6a66;color:#fff;border:0;border-radius:6px;padding:3px 9px;cursor:pointer;">＋ 记录为预测</button></div>`;
        });
        html += '</div>';
      }
      if (ps.consensus) html += `<div style="font-size:13px;color:#3f7d55;margin-top:12px;line-height:1.8;"><b>都同意:</b>${ps.consensus}</div>`;
      if (ps.divergence) html += `<div style="font-size:13px;color:#b5762a;margin-top:6px;line-height:1.8;"><b>还没统一:</b>${ps.divergence}</div>`;
      html += '</div>';
    } else {
      html += `<div style="font-size:13px;color:#a88;margin-bottom:12px;">(本次白话综述未生成,可展开下方专业推理查看)</div>`;
    }

    // 专业推理(可折叠)
    html += `<details style="margin-top:4px;"><summary style="cursor:pointer;font-size:13px;color:#7a6f5f;">查看专业推理过程(三辩手 · 质证 · 裁判)</summary><div style="margin-top:12px;">`;

    // 三辩手
    html += '<div style="display:grid;grid-template-columns:1fr;gap:12px;">';
    cs.debaters.forEach(d => {
      const col = SCHOOL_COLORS[d.school] || '#5d5346';
      html += `<div style="border:1px solid var(--line);border-left:4px solid ${col};border-radius:8px;background:#fff;padding:14px 16px;">
        <div style="font-size:13px;"><b style="color:${col};">${d.school_name}</b>
          <span style="color:#8a7f6e;font-size:11px;">· 辩手 ${d.provider}</span></div>`;
      d.claims.forEach(c => {
        html += `<div style="margin-top:8px;line-height:1.85;font-size:14px;">· ${c.claim}
          ${c.confidence_label ? `<span style="color:#8a7f6e;font-size:11px;">(置信 ${c.confidence_label})</span>`:''}</div>`;
      });
      html += '</div>';
    });
    html += '</div>';

    // 质证
    if (cs.cross_exam && cs.cross_exam.length) {
      html += '<div style="margin-top:16px;font-size:13px;color:#5d5346;"><b>匿名质证</b>(各辩手看到另两方隐去身份的观点后互相质疑):</div>';
      cs.cross_exam.forEach(cx => {
        const ch = (cx.challenges||[]).filter(x=>x&&x.reason);
        if (cx.skipped) { html += `<div style="font-size:12px;color:#a88;margin-top:6px;">· ${cx.role}:${cx.skipped}</div>`; return; }
        if (ch.length) html += `<div style="font-size:13px;color:#7a6f5f;margin-top:6px;line-height:1.8;">· 质疑:${ch.map(x=>x.reason).join('；')}</div>`;
      });
    }

    // 裁判
    if (cs.judge) {
      html += `<div style="margin-top:18px;border:1px solid #cbb; border-radius:8px;background:#faf7fa;padding:14px 16px;">
        <div style="font-size:13px;"><b>裁判裁决</b> <span style="color:#8a7f6e;font-size:11px;">· ${cs.judge.by}</span></div>`;
      (cs.judge.issues||[]).forEach(it => {
        const v = VERDICT[it.verdict] || {t:it.verdict, c:'#5d5346'};
        html += `<div style="margin-top:10px;line-height:1.8;font-size:14px;">
          <span style="background:${v.c};color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;">${v.t}</span>
          ${it.topic}${it.rationale?`<span style="color:#8a7f6e;font-size:12px;"> — ${it.rationale}</span>`:''}</div>`;
      });
      if (cs.judge.summary) html += `<div style="margin-top:12px;font-size:13px;color:#5d5346;line-height:1.9;"><b>小结:</b>${cs.judge.summary}</div>`;
      html += '</div>';
    }
    html += '</div></details>';
    html += `<div style="margin-top:12px;font-size:11px;color:#8a7f6e;line-height:1.8;">${j.disclaimer}</div>`;
    box.innerHTML = html;
    box.querySelectorAll('.recbtn').forEach(b => b.onclick = () => recordPred(b));
  } catch (_) {
    box.innerHTML = '<span style="color:#a33;">请求失败(会诊耗时较长,请确认服务运行)</span>';
  } finally { btn.disabled = false; }
});

// —— 预测 → 回访 → 命中率 ——
function ym(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
function recordPred(btn){
  if (btn._open){ btn._open.remove(); btn._open=null; return; }
  const box=document.createElement('span'); box.style.marginLeft='8px';
  box.innerHTML='时间窗:' + [['3个月',3],['半年',6],['1年',12]].map(([t,m]) =>
    `<button data-m="${m}" style="font-size:11px;margin-left:5px;border:1px solid #2c6a66;color:#2c6a66;background:#fff;border-radius:6px;padding:2px 9px;cursor:pointer;">${t}</button>`).join('');
  box.querySelectorAll('button').forEach(b => b.onclick=()=>savePred(btn, parseInt(b.dataset.m), box));
  btn.after(box); btn._open=box;
}
async function savePred(btn, months, box){
  const start=new Date(), end=new Date(); end.setMonth(end.getMonth()+months);
  const body={chart_line:(window.LASTC||{}).line||'', chart_hash:(window.LASTC||{}).hash||'',
    domain:btn.dataset.domain, statement:decodeURIComponent(btn.dataset.reading),
    window_start:ym(start), window_end:ym(end)};
  box.innerHTML='保存中…';
  try{
    const j=await (await fetch('/api/predict/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    box.innerHTML = j.ok ? `<span style="color:#2c6a66;font-size:11px;">✓ 已记录(到 ${body.window_end} 回访)</span>`
                         : `<span style="color:#a33;font-size:11px;">保存失败</span>`;
  }catch(_){ box.innerHTML='<span style="color:#a33;font-size:11px;">请求失败</span>'; }
  btn._open=null;
}
function pct(x){ return x==null ? '—' : (Math.round(x*1000)/10) + '%'; }
document.getElementById('pv').addEventListener('click', loadPreds);
async function loadPreds(){
  const box=document.getElementById('pvout'); box.style.display='block'; box.innerHTML='加载中…';
  try{
    const j=await (await fetch('/api/predict/list')).json();
    if(!j.ok){ box.innerHTML='加载失败'; return; }
    renderPreds(box, j);
  }catch(_){ box.innerHTML='请求失败'; }
}
function predRow(r, due){
  const St={hit:['命中','#2c6a66'],miss:['未中','#a33'],partial:['部分','#b5762a'],pending:['待核对','#8a7f6e']};
  const st=St[r.status]||St.pending;
  let h=`<div style="border:1px solid var(--line);border-radius:8px;background:${due?'#fbf3e6':'#fff'};padding:10px 14px;margin-top:8px;">
    <div style="font-size:11px;color:#8a7f6e;">${r.domain} · 窗口 ${r.window_start}~${r.window_end} · <span style="color:${st[1]};">${st[0]}</span></div>
    <div style="font-size:14px;line-height:1.7;margin-top:4px;">${r.statement}</div>`;
  if(r.status==='pending'){
    h+='<div style="margin-top:8px;">' + [['hit','命中'],['partial','部分'],['miss','未中']].map(([s,t]) =>
      `<button class="rvbtn" data-id="${r.id}" data-st="${s}" style="font-size:11px;margin-right:6px;border:1px solid #ccc;background:#fff;border-radius:6px;padding:3px 11px;cursor:pointer;">${t}</button>`).join('') + '</div>';
  } else if(r.note){ h+=`<div style="font-size:11px;color:#8a7f6e;margin-top:4px;">回访:${r.note}</div>`; }
  return h+'</div>';
}
function renderPreds(box, j){
  const s=j.stats; let html='';
  html+=`<div style="border:1px solid var(--line);border-radius:10px;background:#fff;padding:14px 18px;">
    <div style="font-size:12px;color:#8a7f6e;letter-spacing:2px;">命中率</div>`;
  if(s.reviewed===0){
    html+='<div style="font-size:14px;margin-top:6px;color:#7a6f5f;line-height:1.8;">还没有可核对的预测。先在会诊结果里「＋记录为预测」,到时间窗之后回来「回访」,命中率就出来了。</div>';
  }else{
    html+=`<div style="font-size:30px;font-weight:600;color:#2c6a66;margin:4px 0;">${pct(s.hit_rate)}</div>
      <div style="font-size:12px;color:#8a7f6e;">已核对 ${s.reviewed} 条(命中 ${s.hit} · 部分 ${s.partial} · 未中 ${s.miss});部分命中按半分计。</div>`;
    const bd=Object.entries(s.by_domain||{});
    if(bd.length) html+='<div style="margin-top:10px;font-size:12px;color:#5d5346;">分领域:' + bd.map(([k,v])=>`${k} ${pct(v.hit_rate)}(${v.n})`).join(' · ') + '</div>';
  }
  html+=`<div style="font-size:11px;color:#a99;margin-top:8px;">${s.honesty}</div></div>`;
  if(j.due && j.due.length){
    html+=`<div style="margin-top:16px;font-size:13px;color:#b5762a;"><b>到期待回访(${j.due.length})</b> —— 核对下当时说中了没:</div>`;
    j.due.forEach(r => html+=predRow(r, true));
  }
  const dueIds=new Set((j.due||[]).map(d=>d.id));
  const others=j.records.filter(r => !dueIds.has(r.id));
  if(others.length){
    html+=`<details style="margin-top:14px;"><summary style="cursor:pointer;font-size:13px;color:#7a6f5f;">全部预测(${j.records.length})</summary>`;
    others.forEach(r => html+=predRow(r, false));
    html+='</details>';
  }
  box.innerHTML=html;
  box.querySelectorAll('.rvbtn').forEach(b => b.onclick=()=>reviewPred(b.dataset.id, b.dataset.st));
}
async function reviewPred(id, status){
  try{
    const j=await (await fetch('/api/predict/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status,note:''})})).json();
    if(j.ok) loadPreds();
  }catch(_){}
}
</script>
