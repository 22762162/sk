# 角色槽位 → 模型路由(DESIGN V3.0 §1.1/§2.1/§3.3)。
# 架构文档可写槽位泛称;实验配置必须落到 resolved_model_id;
# thinking / non-thinking 等推理模式视为不同实验条件。换模型 = 改本文件 + 走 PR。
routing_policy_version: "1.0.0"

development:
  main_implementer:            # 高难高风险:L1 Rust、规格、会诊状态机、提示词起草、差分证据
    tool: claude-code
    configured_alias: fable-5
    resolved_model_id: claude-fable-5
  cost_implementer:            # 常规模块:React 前端、后端 CRUD、脚本、测试补写
    tool: codex
    configured_alias: gpt-codex
    resolved_model_id: 接入时锁定
  cross_reviewer:              # PR 风险分诊、提示词偏袒审计、对抗测试
    tool: codex
    configured_alias: gpt-codex
    resolved_model_id: 接入时锁定
  ref_implementer:             # 参考实现盲写(独立仓库、独立会话,无主仓凭据)
    tool: codex
    configured_alias: gpt-codex
    resolved_model_id: 接入时锁定
  trivial_tasks:
    tool: claude-code
    configured_alias: haiku
    resolved_model_id: claude-haiku-4-5-20251001

runtime:                       # 观察模式默认绑定;研究评测一律用 §2.3 拉丁方轮换,不以固定绑定下结论
  quickread:                   # 单模型速览(P2 简单管线,非辩手)
    provider: anthropic
    configured_alias: claude-sonnet
    resolved_model_id: claude-sonnet-5   # 可用环境变量 SANJIAN_QUICKREAD_MODEL 覆盖
    reasoning_effort: default
  debater_a:
    provider: anthropic
    configured_alias: claude-sonnet
    resolved_model_id: 接入时锁定
    reasoning_effort: 接入时锁定
    school_default: 子平格局派
  debater_b:
    provider: openai
    configured_alias: gpt-5.x        # 具体 ID 以接入时官方文档为准
    resolved_model_id: 接入时锁定
    reasoning_effort: 接入时锁定
    school_default: 旺衰扶抑派
  debater_c:
    provider: deepseek
    configured_alias: deepseek-v
    resolved_model_id: 接入时锁定
    reasoning_effort: 接入时锁定
    school_default: 调候派
  judge:
    policy: 三家轮换盲评            # 每场取一路未参与本场辩论的全新无状态会话;身份脱敏、候选顺序随机
    allow_unresolved: true          # 证据不足必须允许 unresolved,不得强制选边
  fallback_policy: fail_closed      # 研究模式禁止静默 fallback:模型不可用 → 该场标记不可比较

final_signer: human                 # 本人,唯一责任主体
